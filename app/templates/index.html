{% extends "base.html" %}
{% block title %}video2text - 视频转文字{% endblock %}
{% block content %}

<div class="max-w-3xl mx-auto">
    <!-- Hero -->
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold mb-3 bg-gradient-to-r from-blue-400 via-cyan-400 to-emerald-400 bg-clip-text text-transparent">
            视频内容智能总结
        </h1>
        <p class="text-slate-400 text-lg">
            输入链接或上传视频，AI 自动转写并提炼为结构化笔记
        </p>
    </div>

    <!-- Input Card -->
    <div class="bg-slate-900/80 border border-slate-800 rounded-xl p-6 mb-6 backdrop-blur">
        <form action="/process" method="post" enctype="multipart/form-data" class="space-y-5">

            <!-- URL Input -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">视频链接</label>
                <input type="url" name="url" placeholder="YouTube / Bilibili / 抖音 URL…"
                       class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <div class="flex items-center gap-4 text-slate-500 text-sm">
                <span class="flex-1 border-t border-slate-800"></span>
                <span>或者上传本地文件</span>
                <span class="flex-1 border-t border-slate-800"></span>
            </div>

            <!-- File Upload -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">本地视频文件</label>
                <input type="file" name="file" accept="video/*"
                       class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
            </div>

            <!-- Output Mode Selection -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-3">输出格式（可多选）</label>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                    <label class="flex items-center gap-2 p-3 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-blue-500 cursor-pointer transition-colors">
                        <input type="checkbox" name="output_modes" value="md" checked>
                        <span class="text-sm">Markdown</span>
                    </label>
                    <label class="flex items-center gap-2 p-3 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-blue-500 cursor-pointer transition-colors">
                        <input type="checkbox" name="output_modes" value="md_pdf">
                        <span class="text-sm">Markdown PDF</span>
                    </label>
                    <label class="flex items-center gap-2 p-3 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-blue-500 cursor-pointer transition-colors">
                        <input type="checkbox" name="output_modes" value="mm">
                        <span class="text-sm">思维导图 .mm</span>
                    </label>
                    <label class="flex items-center gap-2 p-3 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-blue-500 cursor-pointer transition-colors">
                        <input type="checkbox" name="output_modes" value="mm_pdf">
                        <span class="text-sm">思维导图 PDF</span>
                    </label>
                    <label class="flex items-center gap-2 p-3 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-blue-500 cursor-pointer transition-colors">
                        <input type="checkbox" name="output_modes" value="notion">
                        <span class="text-sm">Notion</span>
                    </label>
                    <label class="flex items-center gap-2 p-3 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-blue-500 cursor-pointer transition-colors">
                        <input type="checkbox" name="output_modes" value="video">
                        <span class="text-sm">下载视频</span>
                    </label>
                </div>
            </div>

            <!-- Submit -->
            
            <!-- Browser Selection -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">浏览器登录状态（用于绕过平台检测）</label>
                <select name="browser"
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">不使用（可能被平台拦截）</option>
                    <option value="chrome" selected>Chrome</option>
                    <option value="safari">Safari</option>
                    <option value="firefox">Firefox</option>
                    <option value="brave">Brave</option>
                    <option value="edge">Edge</option>
                </select>
            </div>

<button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 text-white font-semibold py-3 px-6 rounded-lg hover:from-blue-700 hover:to-cyan-700 transition-all shadow-lg shadow-blue-600/20">
                开始处理
            </button>
        </form>
    </div>
</div>

{% endblock %}
